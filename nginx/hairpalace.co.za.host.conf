# ─── Host nginx reverse proxy — hairpalace.co.za ──────────────────────────────
#
# Deploy to server:
#   cp nginx/hairpalace.co.za.host.conf /etc/nginx/sites-available/hairpalace.co.za
#   ln -s /etc/nginx/sites-available/hairpalace.co.za /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# SSL (run once, then auto-renewed by certbot timer):
#   certbot certonly --webroot -w /var/www/certbot -d hairpalace.co.za -d www.hairpalace.co.za
# ─────────────────────────────────────────────────────────────────────────────

# HTTP — redirect to HTTPS; pass ACME challenge through
server {
    listen 80;
    server_name hairpalace.co.za www.hairpalace.co.za;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — terminate SSL, proxy to hairpalace docker stack on localhost:3001
server {
    listen 443 ssl;
    server_name hairpalace.co.za www.hairpalace.co.za;

    ssl_certificate     /etc/letsencrypt/live/hairpalace.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hairpalace.co.za/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        keep-alive;
    }
}
