name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: strands
          POSTGRES_PASSWORD: strands_test
          POSTGRES_DB: strands_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U strands"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: services/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app tests

      - name: Mypy type check
        run: mypy app --ignore-missing-imports

      - name: Run tests (postgres service)
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://strands:strands_test@localhost:5432/strands_test
          DATABASE_URL: postgresql+asyncpg://strands:strands_test@localhost:5432/strands
          SECRET_KEY: ci-test-secret-key-not-for-production
          ENVIRONMENT: test
        run: pytest -x -q

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Type Check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
        run: npm run build

  # ── Terraform Plan ────────────────────────────────────────────────────────────
  terraform:
    name: Terraform — Validate & Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (local backend for CI)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
